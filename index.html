<script>

let strassen = [];
let aktuelleStrasse = null;

function normalize(text){

return text
.toLowerCase()
.replace(/ä/g,"ae")
.replace(/ö/g,"oe")
.replace(/ü/g,"ue")
.replace(/ß/g,"ss");

}

const LOESCH_PIN = "2410";


function searchStreet(query){

    console.log("NEUE SUCHE AKTIV:", query);

const words = normalize(query).split(" ");

let results = [];

for(let s of strassen){

const name = normalize(s.name);

/* alle Wörter müssen enthalten sein */
let match = words.every(w => name.includes(w));

if(match){
results.push(s);
}

}

return results.slice(0,10);

}



fetch("duesseldorf_strassen.json")
.then(r => r.json())
.then(data => {

strassen = data;

console.log("Straßen geladen:", strassen.length);

});   

function startApp(){
document.getElementById("cover").style.display="none";
document.getElementById("mainPage").style.display="block";
}


/* Datum automatisch setzen */

window.onload = function() {

    // 1. Datum auf heute setzen
    let heute = new Date().toISOString().split("T")[0];
    let datumInput = document.getElementById("datum");
    
    // Wir merken uns das Datum beim Laden, um Änderungen zu prüfen
    if (!datumInput.value) {
        datumInput.value = heute;
    }

    // --- DIE SICHERHEITSABFRAGE BEIM DATUM-WECHSEL ---
    datumInput.addEventListener("change", function() {
        let gewaehltesDatum = this.value;
        let aktuellHeute = new Date().toISOString().split("T")[0];

        // Check: Liegt das Datum in der Vergangenheit?
        if (gewaehltesDatum < aktuellHeute) {
            if (!confirm("⚠ Achtung:\n\nDas gewählte Datum liegt in der Vergangenheit.\n\nMöchtest du wirklich einen Arbeitstag für dieses Datum beginnen?")) {
                this.value = aktuellHeute;
                return;
            }
        }

        // Check: Neuen Tag leeren?
        if (confirm("Neuen Arbeitstag beginnen? Alle aktuellen Einsätze auf dem Bildschirm werden gelöscht.")) {
            document.getElementById("einsatzListe").innerHTML = "";
            einsatzNummer = 0;
            // Wir leeren auch den Speicher für den "aktuellen Tag", damit nichts Altes lädt
            localStorage.removeItem("MED_AktuellerTag");
            alert("Felder wurden geleert. Du kannst jetzt neu starten.");
        }
    });

    // 2. Vorhandene Daten laden (Wagen, Kollege, Schicht)
    let letzterWagen = localStorage.getItem("wagen");
    if (letzterWagen) document.getElementById("wagen").value = letzterWagen;

    let letzterKollege = localStorage.getItem("kollege");
    if (letzterKollege) document.getElementById("kollege").value = letzterKollege;

    let letzteSchicht = localStorage.getItem("schicht");
    if (letzteSchicht) document.getElementById("schicht").value = letzteSchicht;

    // 3. Den gespeicherten Arbeitstag wiederherstellen
    let gespeicherterTag = localStorage.getItem("MED_AktuellerTag");

    if (gespeicherterTag) {
        let arbeitstag = JSON.parse(gespeicherterTag);

        // Nur laden, wenn das Datum im Speicher zum Feld passt
        datumInput.value = arbeitstag.datum;
        document.getElementById("schicht").value = arbeitstag.schicht;
        document.getElementById("wagen").value = arbeitstag.wagen;
        document.getElementById("kollege").value = arbeitstag.kollege;

        // Einsätze aufbauen
        arbeitstag.einsaetze.forEach(function(e, index) {
            let button = document.getElementById("neuerEinsatz");
            if (button) button.click();

            let alleEinsaetze = document.querySelectorAll(".einsatz");
            let einsatz = alleEinsaetze[alleEinsaetze.length - 1];
            let inputs = einsatz.querySelectorAll("input, textarea");

            // Felder füllen
            if(inputs[0]) inputs[0].value = e.einsatzart || "";
            if(inputs[1]) inputs[1].value = e.adresse || "";
            if(inputs[2]) inputs[2].value = e.melder || "";
            if(inputs[3]) inputs[3].value = e.meldung || "";
            if(inputs[4]) inputs[4].value = e.eintreffen || "";
            if(inputs[5]) inputs[5].value = e.abfahrt || "";
            if(inputs[6]) inputs[6].value = e.feststellung || "";
            if(inputs[7]) inputs[7].value = e.massnahmen || "";
            if(inputs[8]) inputs[8].value = e.bemerkung || "";

            // Straßen-Titel nach 50ms wiederherstellen
            if (e.headerTitel) {
                setTimeout(function() {
                    let titelElement = einsatz.querySelector(".einsatzTitel");
                    if (titelElement) {
                        titelElement.innerHTML = e.headerTitel;
                    }
                }, 50);
            }
        });

        // Alle einklappen, außer den letzten
        let alleEinsaetze = document.querySelectorAll(".einsatz");
        alleEinsaetze.forEach(function(e) {
            e.querySelector(".einsatzInhalt").style.display = "none";
            e.querySelector(".toggleSymbol").textContent = "▶";
        });

        if (alleEinsaetze.length > 0) {
            let letzter = alleEinsaetze[alleEinsaetze.length - 1];
            let inhalt = letzter.querySelector(".einsatzInhalt");
            let symbol = letzter.querySelector(".toggleSymbol");
            inhalt.style.display = "block";
            symbol.textContent = "▼";
        }
    }
};


document.getElementById("wagen").addEventListener("change", function(){
localStorage.setItem("wagen", this.value);
});


document.getElementById("kollege").addEventListener("change", function(){

let aktuellerTag = null;

let einsatzNummer = 0;

document.getElementById("neuerEinsatz").addEventListener("click", function(){

einsatzNummer++;

let container = document.createElement("div");
container.className = "einsatz";

container.innerHTML = `
<div class="einsatzHeader">
<h3 class="einsatzTitel">Einsatz ${einsatzNummer}</h3>
<div>
<span class="toggleSymbol">▼</span>

<button class="lockBtn" style="margin-left:10px;cursor:pointer;">🔓</button>

<span class="loeschenSymbol" style="margin-left:10px;cursor:pointer;color:red;">✖</span>
</div>
</div>

<div class="einsatzInhalt">

<div class="einsatzFeld">
<label>Einsatzart</label>
<input list="einsatzartenListe" placeholder="Einsatzart wählen oder tippen">
</div>

<div class="einsatzFeld">
<label>Adresse</label>
<textarea class="adresseFeld" id="strasseInput" placeholder="Straße / Hausnummer" autocomplete="off"></textarea>
<div id="vorschlaege"></div>
<div class="navButtons">
  <button class="navApple">Apple Karten</button>
  <button class="navGoogle">Google Maps</button>
</div>
</div>

<div class="einsatzFeld">
<label>Melder</label>
<input type="text" placeholder="Name oder Firma">
</div>

<div class="zeitGrid">

<div class="einsatzFeld">
<label>Meldung</label>
<input type="time">
</div>

<div class="einsatzFeld">
<label>Eintreffen</label>
<input type="time">
</div>

<div class="einsatzFeld">
<label>Abfahrt</label>
<input type="time">
</div>

</div>

<div class="einsatzFeldGross">
<label>Feststellung</label>
<textarea rows="3" placeholder="Situation vor Ort"></textarea>
</div>

<div class="einsatzFeldGross">
<label>Maßnahmen</label>
<textarea rows="3" placeholder="Was wurde unternommen"></textarea>
</div>

<div class="einsatzFeldGross">
<label>Bemerkung</label>
<textarea rows="2" placeholder="Weitere Hinweise"></textarea>
</div>
</div>
`;

let gesperrt = false;

const lockBtn = container.querySelector(".lockBtn");
const felder = container.querySelectorAll("input, textarea");

lockBtn.addEventListener("click", function(e){

  e.stopPropagation(); // ⬅️ DAS ist der entscheidende Fix

  gesperrt = !gesperrt;

  felder.forEach(f => {
    f.disabled = gesperrt;
  });

lockBtn.textContent = gesperrt ? "🔒" : "✏️";

});

container.querySelector(".einsatzHeader").addEventListener("click", function(){

let inhalt = container.querySelector(".einsatzInhalt");
let symbol = container.querySelector(".toggleSymbol");

let istOffen = inhalt.style.display === "block";

let alle = document.querySelectorAll(".einsatz");

alle.forEach(function(e){

let i = e.querySelector(".einsatzInhalt");
let s = e.querySelector(".toggleSymbol");

i.style.display = "none";
s.textContent = "▶";

});

if(!istOffen){
inhalt.style.display = "block";
symbol.textContent = "▼";
}

});



let adresseInput = container.querySelector(".adresseFeld");
let titel = container.querySelector(".einsatzTitel");

adresseInput.addEventListener("input", function(){

if(this.value.trim() !== ""){

  let einsatz = this.closest(".einsatz");

  if(einsatz.dataset.adresseTitel){
    titel.innerHTML =
      "Einsatz " + einsatzNummer +
      "<br><span class='einsatzAdresse'>" +
      einsatz.dataset.adresseTitel +
      "</span>";
  }else{
    titel.textContent = "Einsatz " + einsatzNummer;
  }

}else{
  titel.textContent = "Einsatz " + einsatzNummer;
}

});

let loeschenButton = container.querySelector(".loeschenSymbol");

loeschenButton.addEventListener("click", function(){

  if(confirm("Diesen Einsatz wirklich löschen?")){

    let pin = prompt("Bitte PIN eingeben:");

document.getElementById("tagSpeichern").addEventListener("click", function(){

    let arbeitstag = {};
    arbeitstag.datum = document.getElementById("datum").value;
    arbeitstag.schicht = document.getElementById("schicht").value;
    arbeitstag.wagen = document.getElementById("wagen").value;
    arbeitstag.kollege = document.getElementById("kollege").value;
    arbeitstag.einsaetze = [];

    let einsaetze = document.querySelectorAll(".einsatz");

    einsaetze.forEach(function(einsatz){
        let daten = {};
        let inputs = einsatz.querySelectorAll("input, textarea");

        // WICHTIG: Den Titel mit der Straße für die History sichern
        let titelElement = einsatz.querySelector(".einsatzTitel");
        daten.headerTitel = titelElement ? titelElement.innerHTML : ""; 

        daten.einsatzart = inputs[0].value;
        daten.adresse = inputs[1].value;
        daten.melder = inputs[2].value;
        daten.meldung = inputs[3].value;
        daten.eintreffen = inputs[4].value;
        daten.abfahrt = inputs[5].value;
        daten.feststellung = inputs[6].value;
        daten.massnahmen = inputs[7].value;
        daten.bemerkung = inputs[8].value;

        arbeitstag.einsaetze.push(daten);
    });

    let archiv = JSON.parse(localStorage.getItem("MED_Archiv")) || [];
    let index = archiv.findIndex(tag => tag.datum === arbeitstag.datum);

    if(index !== -1){
        // DATUM EXISTIERT SCHON -> INTELLIGENT ZUSAMMENFÜHREN
        let existierenderTag = archiv[index];
        
        arbeitstag.einsaetze.forEach(neuerEinsatz => {
            // Wir prüfen, ob dieser Einsatz (Zeit + Adresse) schon im Archiv ist
            let istSchonDrin = existierenderTag.einsaetze.some(alt => 
                alt.adresse === neuerEinsatz.adresse && 
                alt.meldung === neuerEinsatz.meldung
            );

            if(!istSchonDrin) {
                existierenderTag.einsaetze.push(neuerEinsatz);
            }
        });
        
        // Stammdaten aktualisieren
        existierenderTag.wagen = arbeitstag.wagen;
        existierenderTag.kollege = arbeitstag.kollege;
        existierenderTag.schicht = arbeitstag.schicht;
        
        // WICHTIG: Die Einsätze neu sortieren (falls gewünscht, sonst einfach hinten dran)
        // existierenderTag.einsaetze.sort((a, b) => a.meldung.localeCompare(b.meldung));

    } else {
        // NEUES DATUM -> NEUER EINTRAG
        archiv.push(arbeitstag);
    }

    localStorage.setItem("MED_Archiv", JSON.stringify(archiv));
    alert("Arbeitstag erfolgreich im Archiv gespeichert/aktualisiert.");

});


function aktualisiereEinsatzNummern(){
    let alleEinsaetze = document.querySelectorAll(".einsatz");

    alleEinsaetze.forEach(function(einsatz, index){
        let titel = einsatz.querySelector(".einsatzTitel");
        let neueNummer = index + 1;

        // Wir prüfen, ob im HTML des Titels ein Zeilenumbruch oder ein Span ist (unser Straßen-Format)
        if(titel.innerHTML.includes("<br>") || titel.innerHTML.includes("span")) {
            
            // Wir teilen den Text am Zeilenumbruch
            // Teil 0 ist "Einsatz X", Teil 1 ist die "Straße"
            let teile = titel.innerHTML.split("<br>");
            let straßenTeil = teile[1] || ""; 

            // Wir setzen den Titel neu zusammen: Neue Nummer + alte Straße
            titel.innerHTML = "Einsatz " + neueNummer + "<br>" + straßenTeil;
            
        } else {
            // Falls keine Straße drin steht, einfach nur die Nummer aktualisieren
            titel.textContent = "Einsatz " + neueNummer;
        }
    });

    // Die globale Zählvariable für den nächsten neuen Einsatz anpassen
    einsatzNummer = alleEinsaetze.length;
}

        inputs[4].value = e.eintreffen;
        inputs[5].value = e.abfahrt;
        inputs[6].value = e.feststellung;
        inputs[7].value = e.massnahmen;
        inputs[8].value = e.bemerkung;

    });
}

// 🔽 für schnellen Vergleich: vorhandene Daten merken
let vorhandeneDaten = bestehend.map(tag => tag.datum);

// 🔽 nur neue Tage hinzufügen

  if(!vorhandeneDaten.includes(neuerTag.datum)){
    bestehend.push(neuerTag);
  }

});

// 🔽 speichern
localStorage.setItem("MED_Archiv", JSON.stringify(bestehend));

alert("Daten erfolgreich zusammengeführt.");

ladeHistorie();

}catch(error){

}

};

});
